<h2 class="text-3xl font-bold mb-6">API Monitoring Dashboard</h2>

<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-white p-4 rounded shadow">
    <h3 class="text-gray-500">Total APIs</h3>
    <p class="text-2xl font-bold">
      {{ apis().length }}
    </p>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h3 class="text-gray-500">Healthy APIs</h3>
    <p class="text-2xl font-bold text-green-600">1</p>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h3 class="text-gray-500">Failed APIs</h3>
    <p class="text-2xl font-bold text-red-600">1</p>
  </div>
</div>

<div class="bg-white rounded shadow overflow-hidden">
  <table class="w-full">
    <thead class="bg-gray-200">
      <tr>
        <th class="text-left p-3">API</th>
        <th class="text-left p-3">Status</th>
        <th class="text-left p-3">Response Time</th>
        <th class="text-left p-3">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let api of apis()" class="border-t">
        <td class="p-3">{{ api.name }}</td>

        <td class="p-3">
          <span
            class="px-2 py-1 rounded text-white"
            [class.bg-green-500]="api.status === 'OK'"
            [class.bg-red-500]="api.status === 'FAIL'"
          >
            {{ api.status }}
          </span>
        </td>

        <td class="p-3">{{ api.time }} ms</td>
        <td class="p-3">
          <button (click)="checkApi(api)" class="bg-blue-500 text-white px-3 py-1 rounded">
            Check
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
