<h2 class="text-2xl font-semibold tracking-tight text-gray-900 mb-6">Manage Endpoints</h2>

<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-2xl">
  <div class="space-y-5">
    <!-- Endpoint Name Field -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">
        Endpoint Name
        <span class="text-gray-400 text-xs font-normal ml-1">(required)</span>
      </label>
      <input
        type="text"
        [(ngModel)]="endpointName"
        placeholder="e.g., /products, /users, /auth/login"
        class="w-full px-4 py-2.5 text-sm text-gray-900 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none placeholder:text-gray-400"
      />
      <p class="text-xs text-gray-400 mt-1.5">Unique identifier for this API endpoint</p>
    </div>

    <!-- Endpoint URL Field -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">
        Endpoint URL
        <span class="text-gray-400 text-xs font-normal ml-1">(required)</span>
      </label>
      <input
        type="url"
        [(ngModel)]="endpointUrl"
        placeholder="https://api.example.com/v1/users"
        class="w-full px-4 py-2.5 text-sm text-gray-900 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none placeholder:text-gray-400"
      />
      <p class="text-xs text-gray-400 mt-1.5">Full HTTPS URL of your API endpoint</p>
    </div>

    <!-- Action Buttons -->
    <div class="pt-2">
      <button
        (click)="addEndpoint()"
        class="inline-flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition-all duration-200 shadow-sm"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4"
          ></path>
        </svg>
        Add Endpoint
      </button>
    </div>
  </div>
</div>
